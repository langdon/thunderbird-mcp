<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="envelope" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8eaed"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Envelope body - centered and large -->
  <rect x="14" y="26" width="100" height="76" rx="5" ry="5" fill="url(#envelope)" opacity="0.95"/>

  <!-- Envelope flap -->
  <path d="M14 26 L64 58 L114 26" fill="none" stroke="#1a73e8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- MCP text - large, bold, centered on envelope below flap -->
  <text x="64" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="45" fill="#1a1a1a">MCP</text>
</svg>
